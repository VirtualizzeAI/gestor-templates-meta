version: "3.9"

services:
  luna-templates:
    image: ghcr.io/virtualizzeai/gestor-templates-meta:latest

    networks:
      - BisnisNet

    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.luna-templates.rule=Host(`luna.bisnsihub.cloud`)"
        - "traefik.http.routers.luna-templates.entrypoints=websecure"
        - "traefik.http.routers.luna-templates.tls.certresolver=letsencrypt"
        - "traefik.http.services.luna-templates.loadbalancer.server.port=80"
        - "com.hprime.app=luna-templates"
        - "com.hprime.version=1.0"

networks:
  BisnisNet:
    external: true
    name: BisnisNet